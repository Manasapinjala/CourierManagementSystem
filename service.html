<!DOCTYPE html>
<html>

<head>

<title>Customer Service</title>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>Customer Service</h1>

<h2>Contact Support</h2>

<p>Email: support@fasttrack.com</p>
<p>Phone: +91 9876543210</p>

<hr>

<h2>Place Complaint</h2>

<form action="/complaint" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="text" name="tracking_id" placeholder="Tracking ID">

<textarea name="complaint" placeholder="Describe your issue" required></textarea>

<button type="submit">Submit Complaint</button>

</form>

<hr>

<h2>Give Feedback</h2>

<form action="/feedback" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<textarea name="message" placeholder="Your feedback"></textarea>

<button type="submit">Submit Feedback</button>

</form>

<br>

<a href="/">
<button>Back Home</button>
</a>

</body>

</html>
