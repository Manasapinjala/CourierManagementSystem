<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Admin Dashboard</h1>

<a href="/logout"><button>Logout</button></a>
<a href="/view_complaints"><button>View Complaints</button></a>
<a href="/view_feedback"><button>View Feedback</button></a>

<div class="stats">

<div class="stat-card">
<h3>Total</h3>
<p>{{total}}</p>
</div>

<div class="stat-card">
<h3>Delivered</h3>
<p>{{delivered}}</p>
</div>

<div class="stat-card">
<h3>Transit</h3>
<p>{{transit}}</p>
</div>

<div class="stat-card">
<h3>Pending</h3>
<p>{{pending}}</p>
</div>

</div>

<canvas id="courierChart" width="400" height="200"></canvas>
<h2>Add Courier</h2>

<form action="/add" method="POST">

<input name="sender" placeholder="Sender Name" required>
<input name="receiver" placeholder="Receiver Name" required>
<input name="source" placeholder="Source" required>
<input name="destination" placeholder="Destination" required>

<select name="status">
<option>Order Placed</option>
<option>Dispatched</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button type="submit">Add Courier</button>

</form>

<h2>Search Courier</h2>

<input id="searchInput" placeholder="Enter Tracking ID">
<button onclick="searchCourier()">Search</button>

<table>

<tr>
<th>Tracking</th>
<th>Sender</th>
<th>Receiver</th>
<th>Source</th>
<th>Destination</th>
<th>Status</th>
<th>Update</th>
<th>Delete</th>
<th>Receipt</th>
</tr>

{% for c in couriers %}

<tr>

<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[4]}}</td>
<td>{{c[5]}}</td>
<td>{{c[6]}}</td>

<td>

<form action="/update/{{c[1]}}" method="POST">

<select name="status">
<option>Order Placed</option>
<option>Dispatched</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button>Update</button>

</form>

</td>

<td>
<a href="/delete/{{c[1]}}"><button>Delete</button></a>
</td>

<td>
<a href="/receipt/{{c[1]}}"><button>Receipt</button></a>
</td>

</tr>

{% endfor %}

</table>

<script src="/static/script.js"></script>


</body>
</html>
